kind = "web"
previewPath = "/"
title = "Epic Poetry Cafe"
version = "1.0.0"
id = "artifacts/epic-poetry-cafe"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22604

[services.development]
run = "pnpm --filter @workspace/epic-poetry-cafe run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/epic-poetry-cafe", "run", "build" ]
publicDir = "artifacts/epic-poetry-cafe/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22604"
BASE_PATH = "/"
