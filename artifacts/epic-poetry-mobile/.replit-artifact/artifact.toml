kind = "mobile"
previewPath = "/mobile/"
title = "Epic Poetry Mobile"
version = "1.0.0"
id = "artifacts/epic-poetry-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 20832

[services.development]
run = "pnpm --filter @workspace/epic-poetry-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/epic-poetry-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/epic-poetry-mobile", "run", "serve" ]

[services.env]
PORT = "20832"
BASE_PATH = "/mobile/"
