openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Epic Poetry Cafe Management API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: users
    description: User management
  - name: categories
    description: Category masters
  - name: uom
    description: Units of measure
  - name: config
    description: System configuration
  - name: vendors
    description: Vendor management
  - name: ingredients
    description: Ingredient management
  - name: menuItems
    description: Menu item & recipe management
  - name: purchases
    description: Purchase management
  - name: expenses
    description: Expense management
  - name: inventory
    description: Inventory & stock
  - name: sales
    description: Sales management
  - name: waste
    description: Waste management
  - name: trials
    description: Trial & R&D management
  - name: dashboard
    description: Dashboard analytics
  - name: reports
    description: Reports
  - name: auditLogs
    description: Audit logs
  - name: settlements
    description: Daily sales settlement
  - name: pettyCash
    description: Petty cash ledger

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/login:
    post:
      operationId: login
